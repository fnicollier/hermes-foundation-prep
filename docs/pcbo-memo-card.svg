<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <title>P-C-B-O - les 4 modules obligatoires HERMES 2022</title>
  <desc>Pilotage du projet, Conduite du projet, Bases du projet, Organisation du deploiement. Modules obligatoires dans tout projet HERMES, avec activation variable selon la phase.</desc>
  <rect width="720" height="700" fill="#ffffff"/>

  <text x="360" y="32" text-anchor="middle" font-size="22" font-weight="500" fill="#0f172a">P - C - B - O</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#475569">Les 4 modules obligatoires HERMES 2022 (noms officiels)</text>
  <line x1="80" y1="68" x2="640" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <g>
    <rect x="20" y="84" width="160" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="100" cy="120" r="28" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="100" y="131" text-anchor="middle" font-size="32" font-weight="500" fill="#1e293b">P</text>
    <text x="100" y="170" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">Pilotage</text>
    <text x="100" y="184" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">du projet</text>
    <rect x="40" y="194" width="120" height="22" rx="11" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="100" y="209" text-anchor="middle" font-size="11" font-weight="500" fill="#1e3a8a">DECIDER</text>
    <text x="100" y="232" text-anchor="middle" font-size="10.5" fill="#475569">Strategie + jalons</text>
    <line x1="40" y1="244" x2="160" y2="244" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="35" y="262" font-size="10.5" fill="#64748b">Jalons (liberation)</text>
    <text x="35" y="278" font-size="10.5" fill="#64748b">Liste Decisions pilotage</text>
    <text x="35" y="294" font-size="10.5" fill="#64748b">Allocation ressources</text>
    <text x="35" y="310" font-size="10.5" fill="#64748b">Mandant pilote</text>
    <rect x="32" y="318" width="136" height="20" rx="6" fill="#dcfce7" stroke="#86efac"/>
    <text x="100" y="332" text-anchor="middle" font-size="9.5" font-weight="500" fill="#14532d">TOUTES les phases</text>
  </g>

  <g>
    <rect x="200" y="84" width="160" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
