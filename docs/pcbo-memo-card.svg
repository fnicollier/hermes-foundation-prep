    <rect x="580" y="194" width="120" height="22" rx="11" fill="#dcfce7" stroke="#86efac"/>
    <text x="640" y="209" text-anchor="middle" font-size="11" font-weight="500" fill="#14532d">INTRODUIRE</text>
    <text x="640" y="232" text-anchor="middle" font-size="10.5" fill="#475569">Mise en service</text>
    <line x1="580" y1="244" x2="700" y2="244" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="575" y="262" font-size="10.5" fill="#64748b">Concept de deploiement</text>
    <text x="575" y="278" font-size="10.5" fill="#64748b">Formation utilisateurs</text>
    <text x="575" y="294" font-size="10.5" fill="#64748b">Migration</text>
    <text x="575" y="310" font-size="10.5" fill="#64748b">Mesures deploiement</text>
    <rect x="572" y="318" width="136" height="20" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="640" y="332" text-anchor="middle" font-size="9.5" font-weight="500" fill="#78350f">Conc/Real/Depl/Mise en oeuvre</text>
  </g>

  <text x="20" y="370" font-size="13" font-weight="500" fill="#0f172a">Matrice d activation par phase (source : tableau officiel hermes.admin.ch)</text>

  <g font-size="10">
    <rect x="20" y="380" width="160" height="28" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="100" y="398" text-anchor="middle" font-weight="500" fill="#0f172a">Module</text>

    <rect x="180" y="380" width="80" height="28" fill="#dbeafe" stroke="#93c5fd"/>
