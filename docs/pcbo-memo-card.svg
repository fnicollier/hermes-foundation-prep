    <text x="280" y="170" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">Conduite</text>
    <text x="280" y="184" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">du projet</text>
    <rect x="220" y="194" width="120" height="22" rx="11" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="280" y="209" text-anchor="middle" font-size="11" font-weight="500" fill="#78350f">MANAGER</text>
    <text x="280" y="232" text-anchor="middle" font-size="10.5" fill="#475569">Equipe + planning</text>
    <line x1="220" y1="244" x2="340" y2="244" stroke="#e2e8f0" stroke-width="0.5"/>
