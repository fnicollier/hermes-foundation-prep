  <rect x="20" y="540" width="680" height="50" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="40" y="560" font-size="11" font-weight="500" fill="#7c2d12">3 surprises clefs a memoriser :</text>
  <text x="40" y="576" font-size="10.5" fill="#475569">1) Bases du projet est SEULEMENT en Initialisation  -  2) Organisation du deploiement n est PAS en Init ni Cloture  -  3) Pilotage et Conduite sont en continu sur toutes les phases</text>

  <rect x="60" y="605" width="600" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
