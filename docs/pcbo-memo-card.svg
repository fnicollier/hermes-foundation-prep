    <rect x="420" y="436" width="80" height="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="460" y="454" text-anchor="middle" font-weight="500" fill="#14532d">X</text>
    <rect x="500" y="436" width="100" height="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="550" y="454" text-anchor="middle" font-weight="500" fill="#14532d">X</text>
    <rect x="600" y="436" width="80" height="28" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="454" text-anchor="middle" font-weight="500" fill="#14532d">X</text>
  </g>

  <g font-size="10.5">
