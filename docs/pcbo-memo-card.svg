    <text x="215" y="294" font-size="10.5" fill="#64748b">Liste Decisions conduite</text>
    <text x="215" y="310" font-size="10.5" fill="#64748b">Chef de projet conduit</text>
    <rect x="212" y="318" width="136" height="20" rx="6" fill="#dcfce7" stroke="#86efac"/>
    <text x="280" y="332" text-anchor="middle" font-size="9.5" font-weight="500" fill="#14532d">TOUTES les phases</text>
  </g>

  <g>
