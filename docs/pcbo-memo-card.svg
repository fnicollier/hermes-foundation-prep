    <rect x="400" y="194" width="120" height="22" rx="11" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="460" y="209" text-anchor="middle" font-size="11" font-weight="500" fill="#7f1d1d">GARANTIR</text>
    <text x="460" y="232" text-anchor="middle" font-size="10.5" fill="#475569">Exigences transverses</text>
    <line x1="400" y1="244" x2="520" y2="244" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="395" y="262" font-size="10.5" fill="#64748b">Analyse bases legales</text>
    <text x="395" y="278" font-size="10.5" fill="#64748b">Besoins de protection</text>
    <text x="395" y="294" font-size="10.5" fill="#64748b">Concept SIPD</text>
    <text x="395" y="310" font-size="10.5" fill="#64748b">Durabilite</text>
